<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
	<title>カード情報変更 | [[#{shop.title}]]</title>
	<meta charset="UTF-8" />
</head>

<body class="user credit_card_update_input">
	<h2 class="title">カード情報変更</h2>
	<p class="input_message">変更する情報を入力してください。</p>

	<div class="user_info_form_area">
		<form th:action="@{/client/creditcard/update/check}" method="post" th:object="${creditCardForm}">
			<input type="hidden" th:field="*{id}" />
			<div th:if="${#fields.hasErrors()}" class="error_list">
				<ul>
					<li th:each="err : ${#fields.detailedErrors()}" th:text="${err.message}"></li>
				</ul>
			</div>
			<table class="input_table">
				<tr>
					<th>ブランド</th>
					<td>
						<select th:field="*{brand}">
							<option value="Visa">Visa</option>
							<option value="Mastercard">Mastercard</option>
							<option value="JCB">JCB</option>
							<option value="American Express">American Express</option>
						</select>
					</td>
				</tr>
				<tr>
					<th>カード番号</th>
					<td><input type="text" th:field="*{cardNumber}" /></td>
				</tr>
				<tr>
					<th>名義人</th>
					<td><input type="text" th:field="*{holderName}" /></td>
				</tr>
				<tr>
					<th>有効期限</th>
					<td><input type="text" th:field="*{expirationDate}" /></td>
				</tr>
			</table>
			<div class="button_area">
				<input type="submit" value="確認" class="send_button" />
			</div>
		</form>
		<form th:action="@{/client/creditcard/list}" method="get">
			<input type="submit" value="戻る" class="back_button" />
		</form>
	</div>
</body>

</html>
