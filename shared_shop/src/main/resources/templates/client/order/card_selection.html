<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
	<title>クレジットカード選択 | [[#{shop.title}]]</title>
	<meta charset="UTF-8" />
</head>

<body class="user order_card_selection">
	<h2 th:class="title">クレジットカード選択</h2>
	<p th:class="input_message">使用するクレジットカードを選択してください。</p>

	<div class="user_info_form_area">
		<form th:action="@{/client/order/card/select}" method="post">
			<div th:if="${not #lists.isEmpty(creditCards)}">
				<table class="list_table">
					<tr>
						<th>選択</th>
						<th>ブランド</th>
						<th>カード番号</th>
						<th>名義人</th>
					</tr>
					<tr th:each="card, status : ${creditCards}">
						<td>
							<input type="radio" name="creditCardId" th:value="${card.id}" th:checked="${status.index == 0}" />
						</td>
						<td th:text="${card.brand}"></td>
						<td th:text="${card.cardNumber}"></td>
						<td th:text="${card.holderName}"></td>
					</tr>
				</table>
				<input type="submit" class="send_button" value="次へ" />
			</div>

			<div th:if="${#lists.isEmpty(creditCards)}">
				<p>登録されているクレジットカードがありません。<a th:href="@{/client/creditcard/regist/input}">こちらから登録</a>してください。</p>
			</div>
		</form>

		<form th:action="@{/client/order/card/back}" method="post" class="update">
			<input type="submit" class="back_button" value="戻る" />
		</form>
	</div>
</body>

</html>
