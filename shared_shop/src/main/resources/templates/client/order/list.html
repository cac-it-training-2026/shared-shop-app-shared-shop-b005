<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">
<head>
	<title th:text="#{order}+#{title.list}+' | '+ #{shop.title}">注文一覧</title>
	<meta charset="UTF-8" />
</head>
<body class="user order_list">
	<section class="shop-page order-list-page">
		<div class="page-heading-row">
			<h2 class="shop-page-title"><span aria-hidden="true">🐾</span><span th:text="#{order}+#{title.list}">注文一覧</span></h2>
			<div class="speech-mascot-area order-history">
				<div class="speech-bubble">ご注文履歴は<br />こちら♪</div>
				<img class="speech-mascot pc" th:src="@{/images/common/mascot_pc.png}" alt="" />
			</div>
		</div>

		<div th:if="${#lists.isEmpty(orders)}" class="empty-cart-card">
			<img class="empty-mascot" th:src="@{/images/common/mascot_sleep.png}" alt="" />
			<p th:text="#{msg.client.order.list.none}">注文情報はありません。</p>
			<a class="cute-button primary" th:href="@{/client/item/list/1}">商品を見に行く</a>
		</div>

		<div class="order-history-card" th:if="!${#lists.isEmpty(orders)}">
			<div class="order-history-head">
				<span>注文日</span><span>注文番号</span><span>お支払い方法</span><span>合計金額</span><span>注文状況</span><span>注文商品</span><span>詳細</span>
			</div>
			<article class="order-history-row" th:each="order: ${orders}">
				<div class="order-date"><strong th:text="${order.insertDate}">2024/05/15</strong></div>
				<div class="order-code" th:text="${'ORD-' + order.id}">ORD-0001</div>
				<div class="order-pay" th:switch="${order.payMethod}">
					<span th:case="1">[[#{paymethod.credit.str}]]</span>
					<span th:case="2">[[#{paymethod.bank.str}]]</span>
					<span th:case="3">[[#{paymethod.onarrival.str}]]</span>
					<span th:case="4">[[#{paymethod.emoney.str}]]</span>
					<span th:case="5">[[#{paymethod.convenience.str}]]</span>
				</div>
				<div class="order-total"><strong th:text="${'¥' + #numbers.formatInteger(order.total, 1, 'COMMA')}">¥0</strong><small th:text="#{label.tax.included}">（税込）</small></div>
				<div><span class="status-pill">受付済み</span></div>
				<div class="order-preview-items">
					<th:block th:if="${orderPreviewMap != null and orderPreviewMap[order.id] != null}">
						<span class="preview-thumb" th:each="orderItem: ${orderPreviewMap[order.id]}">
							<img th:src="@{/images/{image}(image=${orderItem.image})}" th:if="${orderItem.image != null}" alt="" />
							<img th:src="@{/images/common/no_image.jpg}" th:if="${orderItem.image == null}" alt="" />
						</span>
						<span class="preview-count" th:if="${orderItemCountMap != null and orderItemCountMap[order.id] != null and orderItemCountMap[order.id] > 3}" th:text="${'他 ' + (orderItemCountMap[order.id] - 3) + '点'}">他 1点</span>
					</th:block>
				</div>
				<div><a class="cute-button mini blue" th:href="@{/client/order/detail/{id}(id=${order.id})}">詳細を見る</a></div>
			</article>
			<p class="order-list-note">注文内容の確認は、各注文の詳細ページから行えます。</p>
		</div>
	</section>
</body>
</html>
