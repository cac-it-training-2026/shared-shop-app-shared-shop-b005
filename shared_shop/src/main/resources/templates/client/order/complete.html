<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
	<title th:text="#{title.order.complete}+' | '+ #{shop.title}"> </title>
	<meta charset="UTF-8" />
</head>

<body class="user order_complete">
	<h2 th:class="title" th:text="#{title.order.complete}"></h2>
	<p th:class="complete_message">
		<span th:text="#{msg.order.complete1}"></span>
		<br />
		<span th:text="#{msg.order.complete2}"></span>
	</p>

	<div class="point_info" th:if="${earnedPoint != null}">
		<p th:text="#{msg.order.point.earned(${earnedPoint})}"></p>
	</div>

	<div class="lottery_area" th:if="${orderId != null}">
		<th:block th:if="${lotteryResult == null}">
			<form th:action="@{/client/order/lottery}" method="post">
				<input type="hidden" name="orderId" th:value="${orderId}" />
				<input type="submit" th:value="#{msg.order.lottery.challenge}" class="send_button" />
			</form>
		</th:block>
		<th:block th:if="${lotteryResult != null}">
			<p th:text="#{msg.order.lottery.result(${lotteryRankName}, ${lotteryPoint})}"></p>
		</th:block>
	</div>
	<div th:if="${lotteryError != null}" class="error_message" th:text="${lotteryError}"></div>

	<p class="complete_link"><a th:href="@{/}" th:text="#{msg.back.to.top}"></a></p>
</body>

</html>
