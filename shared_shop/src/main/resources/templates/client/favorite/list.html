<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">
<head>
	<title th:text="#{title.favorite.list} + ' | ' + #{shop.title}">お気に入り商品</title>
	<meta charset="UTF-8" />
</head>
<body>
	<section class="shop-page favorite-page">
		<div class="page-heading-row">
			<h2 class="shop-page-title"><span aria-hidden="true">💗</span><span th:text="#{title.favorite.list}">お気に入り商品</span></h2>
			<div class="speech-mascot-area"><div class="speech-bubble" th:utext="#{design.speech.favorite}">お気に入りを<br />確認できます♪</div><img class="speech-mascot" th:src="@{/images/common/mascot_love.png}" alt="" /></div>
		</div>

		<div th:if="${#lists.isEmpty(favorites)}" class="empty-cart-card">
			<img class="empty-mascot" th:src="@{/images/common/mascot_sleep.png}" alt="" />
			<p th:text="#{msg.client.favorite.list.none}">お気に入り商品はありません。</p>
			<a class="cute-button primary" th:href="@{/client/item/list/1}" th:text="#{design.favorite.search}">商品を探す</a>
		</div>

		<div class="product-grid" th:if="!${#lists.isEmpty(favorites)}">
			<article class="product-card" th:each="favorite : ${favorites}">
				<a class="product-card-link" th:href="@{/client/item/detail/{id}(id=${favorite.item.id})}">
					<div class="product-image-wrap">
						<img th:src="@{/images/{image}(image=${favorite.item.image})}" th:if="${favorite.item.image != null}" alt="" />
						<img th:src="@{/images/common/no_image.jpg}" th:if="${favorite.item.image == null}" alt="" />
						<span class="heart-badge active" aria-hidden="true">♥</span>
					</div>
					<h3 class="product-name" th:text="${favorite.item.getName(#locale.language)}">商品名</h3>
					<p class="product-price"><span th:text="${'¥' + #numbers.formatInteger(favorite.item.price, 1, 'COMMA')}">¥0</span><small th:text="#{label.tax.included}">（税込）</small></p>
				</a>
				<form th:action="@{/client/favorite/toggle/{itemId}(itemId=${favorite.item.id})}" method="post" class="favorite-remove-form">
					<input type="submit" th:value="#{button.favorite.remove}" class="cute-button mini pink" />
				</form>
			</article>
		</div>

		<div class="detail-action-panel centered">
			<a th:href="@{/}" class="cute-button blue" th:text="#{msg.back.to.top}">トップへ戻る</a>
		</div>
	</section>
</body>
</html>
