<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
</head>
<body>
<aside th:fragment="layout-sidebar" th:class="${session.user == null or session.user.authority == 2} ? ${'search cute-sidebar'} : ${'admin_menu'}" >
	<!--/* 検索メニュー(非会員、一般会員用) */-->
	<div class="search_area" th:if="${session.user == null or session.user.authority == 2}">
		<img class="sidebar-mascot" th:src="@{/images/common/mascot_box.png}" alt="" aria-hidden="true" />
		<h2 class="title"><span aria-hidden="true">🐾</span><span th:text="#{category.select.title}">カテゴリー検索</span></h2>
		<nav class="category-card-list" aria-label="カテゴリー検索">
			<a class="category-card" th:href="@{/client/item/list/1(categoryId=0)}">
				<span class="category-icon" aria-hidden="true">🔎</span>
				<span th:text="#{constants.category.select.none}">すべて</span>
				<span class="category-arrow" aria-hidden="true">›</span>
			</a>
			<a class="category-card" th:each="category, stat: ${categories}"
				th:href="@{/client/item/list/{sort}(sort=${sortType != null ? sortType : 1}, categoryId=${category.id})}">
				<span class="category-icon" aria-hidden="true">🧀</span>
				<span th:text="${category.getName(#locale.language)}">カテゴリー</span>
				<span class="category-arrow" aria-hidden="true">›</span>
			</a>
		</nav>
		<a class="sidebar-search-button" th:href="@{/client/item/list/1}"><span aria-hidden="true">🔍</span><span th:text="#{select}">検索する</span></a>
	</div>

	<!--/* メニュー(運用管理者、及びシステム管理者用) */-->
	<div th:if="${session.user != null and session.user.authority != 2}">
		<h2 th:class="title" th:text="#{admin.menu}"></h2>
		<ul class="menu">
			<li><a th:href="@{/admin/user/list}" th:class="display_list" th:text="#{admin.menu.user.list}"></a></li>
			<li th:if="${session.user.authority == 1}"><a th:href="@{/admin/order/list}" th:class="display_list" th:text="#{admin.menu.order.list}"></a></li>
			<li th:if="${session.user.authority == 1}"><a th:href="@{/admin/item/list}" th:class="display_list" th:text="#{admin.menu.item.list}"></a></li>
			<li th:if="${session.user.authority == 1}"><a th:href="@{/admin/category/list}" th:class="display_list" th:text="#{admin.menu.category.list}"></a></li>
		</ul>
	</div>
</aside>
</body>
</html>
