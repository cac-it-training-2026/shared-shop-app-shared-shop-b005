<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{common/layout_3block :: layout(~{::title},~{::body/content()})}">
<head>
    <meta charset="UTF-8" />
    <title th:text="#{title.password.reset} + ' | ' + #{shop.title}">パスワード再設定 | シェアードショップ</title>
</head>
<body class="user_login password-reset-page">
<div class="password-reset-wrap">
    <div class="password-reset-card">
        <div class="password-reset-heading">
            <img th:src="@{/images/common/mascot_box.png}" alt="" />
            <div>
                <p class="auth-kicker">新しいパスワード</p>
                <h2 th:text="#{title.password.reset.new}">新しいパスワード設定</h2>
                <p>新しいパスワードを入力して、再設定を完了してください。</p>
            </div>
        </div>

        <div class="auth-message-area">
            <div th:if="${errorMessage}" class="error_list"><ul><li th:text="${errorMessage}"></li></ul></div>
            <div th:if="${message}" class="message_list"><ul><li th:text="${message}"></li></ul></div>
        </div>

        <form th:action="@{/password_reset/form}" method="post" class="cute-form password-reset-form">
            <input type="hidden" name="token" th:value="${token}" />
            <div class="form-row">
                <label for="newPassword" th:text="#{label.new.password}">新しいパスワード</label>
                <input id="newPassword" type="password" name="newPassword" required autocomplete="new-password" />
            </div>
            <div class="detail-action-panel centered password-reset-actions">
                <input type="submit" th:value="#{button.update}" class="cute-button primary" />
                <a th:href="@{/login}" class="cute-button blue">ログイン画面へ戻る</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
