<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{common/layout_3block :: layout(~{::title},~{::body/content()})}">
<head>
    <meta charset="UTF-8" />
    <title>パスワード再設定申請 | シェアードショップ</title>
</head>
<body class="user_login">
<div class="user_container">
    <h2 class="page_title">パスワード再設定</h2>
    <div class="login_content">
        <p class="description">登録メールアドレスと秘密の質問の回答を入力してください。</p>
        <div class="login_form_area">
            <form th:action="@{/password_reset/request}" method="post" class="login_form">
                <div th:if="${errorMessage}" class="error_list">
                    <ul><li th:text="${errorMessage}"></li></ul>
                </div>
                <div th:if="${message}" class="message_list">
                    <ul><li th:text="${message}"></li></ul>
                </div>
                <table>
                    <tbody>
                        <tr>
                            <th class="label">メールアドレス</th>
                            <td class="input"><input type="email" name="email" required /></td>
                        </tr>
                        <tr>
                            <th class="label">秘密の質問の回答</th>
                            <td class="input"><input type="text" name="secretAnswer" required /></td>
                        </tr>
                        <tr>
                            <th class="label"></th>
                            <td class="input"><input type="submit" value="送信" /></td>
                        </tr>
                    </tbody>
                </table>
            </form>
        </div>
    </div>
</div>
</body>
</html>
