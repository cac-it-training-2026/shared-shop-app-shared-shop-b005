<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{common/layout_3block :: layout(~{::title},~{::body/content()})}">
<head>
    <meta charset="UTF-8" />
    <title th:text="#{title.password.reset.request} + ' | ' + #{shop.title}">パスワード再設定申請 | シェアードショップ</title>
</head>
<body class="user_login password-reset-page">
<div class="password-reset-wrap">
    <div class="password-reset-card">
        <div class="password-reset-heading">
            <img th:src="@{/images/common/mascot_pc.png}" alt="" />
            <div>
                <p class="auth-kicker">パスワード再設定</p>
                <h2 th:text="#{title.password.reset}">パスワード再設定</h2>
                <p>登録済みのメールアドレスを入力すると、秘密の質問が表示されます。</p>
            </div>
        </div>

        <div class="auth-message-area">
            <div th:if="${errorMessage}" class="error_list"><ul><li th:text="${errorMessage}"></li></ul></div>
            <div th:if="${message}" class="message_list"><ul><li th:text="${message}"></li></ul></div>
        </div>

        <p th:if="${resetToken != null}" class="complete_link reset-link-box">
            <a th:href="@{/password_reset/form(token=${resetToken})}" th:text="#{link.password.reset.form}">新しいパスワードを設定する</a>
        </p>

        <form th:action="@{/password_reset/request}" method="post" class="cute-form password-reset-form">
            <div class="form-row">
                <label for="resetEmail" th:text="#{loginForm.email}">メールアドレス</label>
                <input id="resetEmail" type="email" name="email" th:value="${email}" required autocomplete="email" />
            </div>
            <div class="form-row secret-question-row" th:if="${secretQuestion != null}">
                <label th:text="#{label.secret.question}">秘密の質問</label>
                <div class="secret-question-box" th:text="${secretQuestion}">秘密の質問</div>
            </div>
            <div class="form-row" th:if="${secretQuestion != null}">
                <label for="secretAnswer" th:text="#{label.secret.answer}">秘密の質問の回答</label>
                <input id="secretAnswer" type="text" name="secretAnswer" required autocomplete="off" />
            </div>
            <div class="detail-action-panel centered password-reset-actions">
                <input th:if="${secretQuestion == null}" type="submit" th:value="#{button.show.secret.question}" class="cute-button primary" />
                <input th:if="${secretQuestion != null}" type="submit" th:value="#{button.send}" class="cute-button primary" />
                <a th:href="@{/login}" class="cute-button blue">ログイン画面へ戻る</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
