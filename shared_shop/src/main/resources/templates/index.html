<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">
<head>
<title th:text="#{top}+' | '+ #{shop.title}">トップ</title>
<meta charset="UTF-8" />
</head>
<body>
	<section class="shop-page top-page">
		<div class="hero-card">
			<div>
				<p class="hero-kicker" th:text="#{design.hero.kicker}">Welcome to Shared Shop</p>
				<h2 th:text="#{design.hero.title}">かわいい商品を、ゆっくり選べるECサイト</h2>
				<p th:text="#{design.hero.lead}">商品詳細・買い物かご・注文・お気に入り・レビューまで実際の機能につながっています。</p>
				<a class="cute-button primary" th:href="@{/client/item/list/1}" th:text="#{design.hero.button}">商品を見に行く</a>
			</div>
			<div class="hero-mouse" aria-hidden="true"><img th:src="@{/images/common/mascot_luxury.png}" alt="" /></div>
		</div>

		<div class="page-heading-row">
			<h2 class="shop-page-title">
				<span aria-hidden="true">🧀</span>
				<span th:if="${sortType==1}" th:text="#{sort.latest.title}">新着商品</span>
				<span th:if="${sortType==2 || sortType==null}" th:text="#{sort.hotsell.title}">売れ筋商品</span>
			</h2>
		</div>

		<p class="empty-message" th:text="#{msg.client.item.list.none}" th:if="${#lists.isEmpty(items)}"></p>

		<div class="product-grid compact" th:if="!${#lists.isEmpty(items)}">
			<article class="product-card" th:each="item, status : ${items}" th:if="${status.count le 10}">
				<form th:if="${session.user != null and session.user.authority == 2}" th:action="@{/client/favorite/toggle/{itemId}(itemId=${item.id})}" method="post" class="favorite-heart-form">
					<button type="submit" class="heart-badge favorite-toggle" th:classappend="${item.favorite} ? ' active' : ''" th:attr="aria-label=${item.favorite} ? 'お気に入り解除' : 'お気に入り登録'" th:text="${item.favorite} ? '♥' : '♡'">♡</button>
				</form>
				<span th:unless="${session.user != null and session.user.authority == 2}" class="heart-badge readonly" aria-hidden="true">♡</span>
				<a class="product-card-link" th:href="@{/client/item/detail/{id}(id=${item.id}, sortType=2, categoryId=0)}">
					<div class="product-image-wrap">
						<img th:src="@{/images/{image}(image=${item.image})}" th:if="${item.image != null}" alt="" />
						<img th:src="@{/images/common/no_image.jpg}" th:if="${item.image == null}" alt="" />
					</div>
					<h3 class="product-name" th:text="${item.getName(#locale.language)}">商品名</h3>
					<p class="product-price"><span th:text="${'¥' + #numbers.formatInteger(item.price, 1, 'COMMA')}">¥0</span><small th:text="#{label.tax.included}">（税込）</small></p>
				</a>
			</article>
		</div>
	</section>
</body>
</html>
